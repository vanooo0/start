<title>Flip — your account works on its own</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css">
<style>
.fi{border-radius:3px;background-size:cover;background-position:center}
.langopt .fl{font-size:16px;flex:none}
#langbtn .fi{font-size:15px}
:root{
  --bg:#070a10; --bg2:#0b1018; --ink:#eaf1f7; --soft:#9db0c0; --dim:#5f7383;
  --line:#18222e; --card:#0e151f;
  --cyan:#3ce0d0; --cyan-dim:#155650; --amber:#f2b43e; --amber-dim:#4a3512;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--ink);
  font:16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,"Noto Sans Arabic",sans-serif;
  -webkit-font-smoothing:antialiased;overflow-x:hidden}
.mono{font-family:ui-monospace,"SF Mono","JetBrains Mono",Consolas,monospace}
.wrap{max-width:760px;margin:0 auto;padding:0 24px}
[dir="rtl"] .lede,[dir="rtl"] .row p,[dir="rtl"] .row h3{text-align:right}

/* ---- language gate (first step) ---- */
#gate{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(120% 90% at 50% 30%,#0c1a22,#04060a 85%)}
#gate.hide{display:none}
#flyflag{position:fixed;inset:0;z-index:60;background-size:cover;background-position:center;
  opacity:0;pointer-events:none;will-change:transform,opacity}
#flyflag::after{content:"";position:absolute;inset:0;box-shadow:inset 0 0 220px 60px rgba(0,0,0,.55)}
#flycanvas{position:fixed;inset:0;z-index:60;display:none;width:100vw;height:100vh;pointer-events:none}
#flyflag.go{animation:flyin 1.15s cubic-bezier(.45,0,.25,1) forwards}
@keyframes flyin{
  0%{opacity:0;transform:perspective(1300px) translateZ(-1000px) scale(.22) rotateX(20deg)}
  22%{opacity:1}
  62%{opacity:1;transform:perspective(1300px) translateZ(0) scale(1) rotateX(0)}
  100%{opacity:0;transform:perspective(1300px) translateZ(600px) scale(2.4) rotateX(-8deg)}
}
.gate-card{max-width:440px;width:100%;text-align:center}
.globe{font-size:46px;margin-bottom:14px;animation:spin 14s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.gate-card{max-height:92vh;overflow-y:auto;scrollbar-width:none;-ms-overflow-style:none}
.gate-card::-webkit-scrollbar{display:none}
.gate-t{font-size:24px;font-weight:750;letter-spacing:-.4px;margin-bottom:8px}
.gate-s{color:var(--soft);font-size:13.5px;margin-bottom:22px;line-height:1.5}
.gate-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.langopt{display:flex;align-items:center;gap:10px;justify-content:flex-start;
  background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 16px;
  color:var(--ink);font-size:15px;font-weight:550;cursor:pointer;transition:.15s;font-family:inherit}
.langopt:hover{border-color:var(--cyan);background:#0f1a1e}
.langopt .fl{font-size:19px}
@media(max-width:420px){.gate-grid{grid-template-columns:1fr}}

/* ---- language switcher ---- */
#langbtn{position:fixed;top:16px;right:16px;z-index:40;background:rgba(11,16,24,.7);backdrop-filter:blur(6px);
  border:1px solid var(--line);border-radius:999px;padding:7px 13px;color:var(--soft);font-size:13px;
  cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:7px}
#langbtn:hover{color:var(--ink);border-color:var(--cyan)}
[dir="rtl"] #langbtn{right:auto;left:16px}

/* ---- shared section rhythm ---- */
section{position:relative;min-height:100vh;display:flex;align-items:center;padding:96px 0}
.eyebrow{font-family:ui-monospace,monospace;font-size:12px;letter-spacing:4px;text-transform:uppercase;
  color:var(--cyan);margin-bottom:22px}
h1{font-size:clamp(40px,8.5vw,76px);line-height:1.02;margin:0;font-weight:800;letter-spacing:-1.5px;text-wrap:balance}
h2{font-size:clamp(30px,5.5vw,48px);line-height:1.08;margin:0 0 20px;font-weight:750;letter-spacing:-.8px;text-wrap:balance}
.lede{color:var(--soft);font-size:clamp(17px,2.4vw,21px);max-width:46ch;margin:26px 0 0;text-wrap:balance}
.grad{background:linear-gradient(100deg,var(--cyan),#9fe9ff 40%,var(--amber));
  -webkit-background-clip:text;background-clip:text;color:transparent}

/* ---- hero ---- */
#hero{overflow:hidden}
#gl{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:0}
#motifs{position:absolute;inset:0;z-index:1;overflow:hidden;pointer-events:none}
#motifs span{will-change:transform,opacity;filter:saturate(1.2) drop-shadow(0 2px 6px rgba(0,0,0,.45))}
@keyframes floatUp{0%{transform:translateY(0) rotate(0);opacity:0}
  14%{opacity:.5}84%{opacity:.5}100%{transform:translateY(-120vh) rotate(18deg);opacity:0}}
.critter{filter:drop-shadow(0 4px 7px rgba(0,0,0,.5));transition:filter .15s}
.critter:hover,.critter:active{filter:drop-shadow(0 0 12px var(--cyan))}
.hanger{position:absolute;top:100%;font-size:27px;transform-origin:top center;
  animation:swing 3.2s ease-in-out infinite;pointer-events:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,.45))}
.hanger::before{content:"";position:absolute;bottom:100%;left:50%;width:2px;height:15px;
  background:linear-gradient(var(--cyan),transparent);opacity:.65}
@keyframes swing{0%,100%{transform:rotate(-14deg)}50%{transform:rotate(14deg)}}
.confetti{position:fixed;z-index:35;pointer-events:none;will-change:transform,opacity;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
/* ---- per-country bespoke scene engine (plays in margins, never over the reading column) ---- */
#fx{position:fixed;inset:0;z-index:40;pointer-events:none;overflow:hidden}
#fx *{position:absolute}
.eiffel{right:7vw;bottom:6vh;transform-origin:bottom center;opacity:0;filter:drop-shadow(0 4px 7px rgba(0,0,0,.5))}
.eiffel.go{animation:eifFall 2.7s forwards}
@keyframes eifFall{
  0%{opacity:0;transform:rotate(0);animation-timing-function:ease-out}
  7%{opacity:1;transform:rotate(-3.5deg)}
  17%{transform:rotate(3deg)}
  26%{transform:rotate(-2deg)}
  36%{transform:rotate(1.5deg);animation-timing-function:cubic-bezier(.82,0,.95,.5)}
  100%{opacity:1;transform:rotate(91deg)}}
.dust{bottom:6vh;width:12px;height:12px;border-radius:50%;background:rgba(205,195,175,.55);opacity:0}
.dust.go{animation:dustPuff 1.1s ease-out 2.45s forwards}
@keyframes dustPuff{0%{opacity:.7;transform:scale(.3)}100%{opacity:0;transform:scale(3.6) translateY(-16px)}}
.wine{right:2vw;bottom:5.5vh;width:0;height:0;border-radius:46%;
  background:radial-gradient(closest-side,#7d1330 62%,rgba(125,19,48,.25) 88%,rgba(125,19,48,0));transform:translate(26px,8px)}
.wine.go{animation:wineSpill 1.5s cubic-bezier(.3,1.25,.5,1) 2.5s forwards}
@keyframes wineSpill{0%{width:0;height:0;opacity:.95}72%{width:220px;height:80px;opacity:.86}100%{width:204px;height:76px;opacity:.82}}
/* UK — bus drives across, corgi trots behind */
.bob2{animation:driveBob .42s ease-in-out infinite;transform-origin:center bottom}
@keyframes driveBob{0%,100%{transform:translateY(0) rotate(-.5deg)}50%{transform:translateY(-3px) rotate(.5deg)}}
/* Germany — stein slides in, clinks, bubbles rise */
@keyframes steinIn{0%{transform:translateX(160px);opacity:0}60%{opacity:1}100%{transform:translateX(0)}}
@keyframes steinClink{0%,100%{transform:rotate(0)}50%{transform:rotate(-11deg)}}
.bub{border-radius:50%;background:rgba(255,255,255,.92)}
@keyframes bubUp{0%{opacity:0;transform:translateY(0) scale(.6)}25%{opacity:.9}100%{opacity:0;transform:translateY(-70px) scale(1)}}
/* Japan — sakura drifts, torii rises */
@keyframes petalDrift{0%{opacity:0;transform:translateY(0) translateX(0) rotate(0)}10%{opacity:.95}
  50%{transform:translateY(56vh) translateX(30px) rotate(200deg)}100%{opacity:0;transform:translateY(116vh) translateX(-30px) rotate(420deg)}}
@keyframes toriiIn{0%{opacity:0;transform:translateY(34px) scale(.82)}60%{opacity:1}80%{transform:translateY(-4px) scale(1.03)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes fanOpen{0%{transform:scaleX(.06) rotate(-6deg);opacity:0}30%{opacity:1}100%{transform:scaleX(1) rotate(0)}}
@keyframes flutter{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@keyframes sunGrow{0%{transform:scale(0) rotate(-35deg);opacity:0}60%{opacity:1}100%{transform:scale(1) rotate(0)}}
@keyframes riseSway{0%{transform:translateY(30px) translateX(0);opacity:0}12%{opacity:1}55%{transform:translateY(-58vh) translateX(24px)}100%{transform:translateY(-120vh) translateX(-6px);opacity:0}}
@keyframes spinIn{0%{transform:scale(0) rotate(-560deg);opacity:0}60%{opacity:1}100%{transform:scale(1) rotate(0)}}
.bearRun{bottom:10vh;left:0;animation:bearAcross 4.2s linear forwards}
.bearRun .bob{animation:bearBob .46s ease-in-out infinite;transform-origin:center bottom}
@keyframes bearAcross{0%{transform:translateX(-180px)}100%{transform:translateX(107vw)}}
@keyframes bearBob{0%,100%{transform:translateY(0) rotate(-2.5deg)}50%{transform:translateY(-12px) rotate(2.5deg)}}
.snow{border-radius:50%;background:#fff}
@keyframes snowFall{to{transform:translateY(103vh);opacity:0}}
#fx .p{filter:drop-shadow(0 3px 6px rgba(0,0,0,.4))}
@keyframes petalFall{0%{opacity:0;transform:translateY(0) rotate(0)}12%{opacity:.92}100%{opacity:0;transform:translateY(114vh) rotate(240deg)}}
@keyframes runX{from{transform:translateX(-20vw)}to{transform:translateX(120vw)}}
@keyframes arcX{0%{transform:translate(0,0);opacity:1}50%{transform:translate(50vw,-25vh)}100%{transform:translate(118vw,8vh);opacity:0}}
@keyframes growPop{to{transform:scale(1)}}
@keyframes swingDown{from{transform:translateY(-70px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes swayA{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(12deg)}}
@keyframes balloonUp{0%{opacity:0}10%{opacity:1}100%{transform:translateY(-120vh);opacity:0}}
#hero .wrap{position:relative;z-index:2}
#hero::after{content:"";position:absolute;inset:0;z-index:1;
  background:radial-gradient(120% 90% at 50% 40%,transparent 40%,var(--bg) 92%)}
.badge{display:inline-flex;align-items:center;gap:9px;border:1px solid var(--line);
  background:rgba(10,16,24,.6);backdrop-filter:blur(6px);border-radius:999px;padding:7px 15px;
  font-size:13px;color:var(--soft);margin-bottom:30px}
.badge .d{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan)}
.scroll{position:absolute;bottom:34px;left:50%;transform:translateX(-50%);z-index:2;
  color:var(--dim);font-size:12px;letter-spacing:2px;text-transform:uppercase;display:flex;
  flex-direction:column;align-items:center;gap:10px}
.scroll .ln{width:1px;height:36px;background:linear-gradient(var(--cyan),transparent);animation:drop 1.9s ease-in-out infinite}
@keyframes drop{0%,100%{opacity:.3;transform:scaleY(.5);transform-origin:top}50%{opacity:1;transform:scaleY(1)}}

/* ---- cards ---- */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:40px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px}
.card .cv{height:56px;margin-bottom:16px}
.card h3{margin:0 0 7px;font-size:17px;font-weight:650}
.card p{margin:0;color:var(--soft);font-size:14.5px;line-height:1.5}

/* ---- trust rows ---- */
.rows{display:grid;gap:2px;margin-top:34px;border:1px solid var(--line);border-radius:16px;overflow:hidden}
.row{display:grid;grid-template-columns:auto 1fr;gap:18px;padding:20px 22px;background:var(--card);align-items:start}
.row .m{width:34px;height:34px;border-radius:10px;background:var(--cyan-dim);color:var(--cyan);
  display:grid;place-items:center;font-size:16px;flex:none}
.row h3{margin:2px 0 5px;font-size:16.5px;font-weight:650}
.row p{margin:0;color:var(--soft);font-size:14.5px;line-height:1.5}
.blackbox{margin-top:16px;border:1px dashed var(--amber-dim);background:linear-gradient(180deg,rgba(242,180,62,.05),transparent);
  border-radius:16px;padding:22px}
.blackbox .k{font-family:ui-monospace,monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--amber);margin-bottom:10px}
.blackbox p{margin:0;color:var(--soft);font-size:15.5px}

/* ---- closing ---- */
#join .box{border:1px solid var(--line);border-radius:22px;padding:46px 34px;text-align:center;
  background:radial-gradient(90% 120% at 50% 0%,rgba(60,224,208,.08),var(--card))}
.step-mini{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:26px 0 30px}
.step-mini span{font-size:13.5px;color:var(--soft);background:var(--bg2);border:1px solid var(--line);
  border-radius:999px;padding:8px 15px}
.note{color:var(--dim);font-size:13px;max-width:52ch;margin:14px auto 0;line-height:1.55}

/* 3D reveal on scroll */
.rise{opacity:0;transform:perspective(1000px) rotateX(16deg) translateY(40px);transform-origin:center top;
  transition:opacity .8s ease,transform .95s cubic-bezier(.16,.84,.24,1)}
.rise.in{opacity:1;transform:perspective(1000px) rotateX(0) translateY(0)}
.cards,.rows{perspective:1100px}
.card,.row{transition:transform .35s cubic-bezier(.2,.7,.2,1),border-color .35s}
.card:hover{transform:rotateX(4deg) rotateY(-5deg) translateY(-4px);border-color:var(--cyan-dim)}
.row:hover{transform:translateX(4px);border-color:var(--cyan-dim)}
[dir="rtl"] .row:hover{transform:translateX(-4px)}
@media (prefers-reduced-motion:reduce){.rise{opacity:1;transform:none;transition:none}
  .card:hover,.row:hover{transform:none}.scroll .ln,.globe{animation:none}}
@media (max-width:620px){.cards{grid-template-columns:1fr}section{padding:80px 0}}
</style>

  what_lede:"Цена на бирже иногда чуть отстаёт от справедливой — на доли секунды. Наш движок ловит этот момент и заходит на догон. На этих парах нет комиссии, поэтому даже крошечный догон уходит в плюс.",
  card_gap_h:"Отставание",card_gap_p:"Момент, когда биржа не успела за честной ценой. Это и есть наша добыча.",
  card_zero_h:"Ноль комиссии",card_zero_p:"На выбранных парах биржа не берёт сбор. Весь догон остаётся тебе.",
  card_fast_h:"Секундные входы",card_fast_p:"Сделка живёт секунды. Зашли, забрали догон, вышли — и снова ждём момент.",
  how_eyebrow:"как это устроено",how_h2:"Ты держишь ключи. Мы держим движок.",
  how_lede:"Никакого доступа к твоим деньгам мы не получаем. Ты остаёшься полным хозяином аккаунта — движок только подсказывает ходы.",
  row1_h:"Твой вход остаётся у тебя",row1_p:"Расширение работает в твоём браузере, под твоим логином. Оператор твой доступ не видит.",
  row2_h:"Вывести твои деньги нельзя",row2_p:"Любой вывод требует твоего подтверждения на бирже. Технически увести баланс невозможно.",
  row3_h:"Движок присылает ходы — аккаунт исполняет",row3_p:"Ты ничего не нажимаешь. Всё происходит само, пока ты занят своими делами.",
  row4_h:"Работает из любой точки мира",row4_p:"Сделки идут с твоего интернета, без привязки к стране. Где бы ты ни был — работает.",
  row5_h:"Стоп в любой момент",row5_p:"Выключил расширение или вышел из биржи — и всё замерло. Ты ничем не связан.",
  bb_k:"а как именно движок находит моменты?",
  bb_p:"Это наша кухня — годы настройки и живой статистики. Тебе её знать не нужно: ты просто подключаешься и получаешь свою долю с того, что заработал твой аккаунт.",
  join_eyebrow:"поехали",join_h2:"Три минуты — и аккаунт в деле",
  step1:"1 · получаешь свой файл",step2:"2 · ставишь расширение",step3:"3 · заходишь в MEXC",
  join_lede:"Дальше он работает сам. Готов — напиши оператору, который прислал тебе эту ссылку.",
  note:"Профит делим по договорённости: считается по логу каждой сделки, прозрачно. Аккаунт и деньги всё время твои."},
 es:{name:"Español",badge:"MEXC · pares sin comisión",h1a:"Tu cuenta",h1b:"trabaja sola",
  hero_lede:"Conecta tu cuenta en tres minutos. Después opera sin ti — y en cualquier momento ves cuánto has ganado.",
  scroll:"desliza",what_eyebrow:"la idea",what_h2:"De dónde sale la ganancia",
  what_lede:"A veces el precio del exchange se retrasa frente al precio justo, por fracciones de segundo. Nuestro motor capta ese momento y aprovecha el alcance. Estos pares no tienen comisión, así que incluso un alcance mínimo termina en ganancia.",
  card_gap_h:"El retraso",card_gap_p:"El momento en que el exchange no alcanzó el precio justo. Esa es nuestra presa.",
  card_zero_h:"Cero comisiones",card_zero_p:"En los pares elegidos el exchange no cobra nada. Todo el alcance es tuyo.",
  card_fast_h:"Entradas de segundos",card_fast_p:"Una operación dura segundos. Entras, tomas el alcance, sales — y esperas el siguiente momento.",
  how_eyebrow:"cómo funciona",how_h2:"Tú tienes las llaves. Nosotros, el motor.",
  how_lede:"Nunca accedemos a tu dinero. Sigues siendo el dueño total de tu cuenta — el motor solo sugiere los movimientos.",
  row1_h:"Tu acceso se queda contigo",row1_p:"La extensión funciona en tu navegador, bajo tu sesión. El operador no ve tu acceso.",
  row2_h:"Tu dinero no se puede retirar",row2_p:"Cualquier retiro exige tu confirmación en el exchange. Vaciar el saldo es técnicamente imposible.",
  row3_h:"El motor envía las jugadas — tu cuenta las ejecuta",row3_p:"No pulsas nada. Todo ocurre solo mientras haces tu vida.",
  row4_h:"Funciona desde cualquier lugar",row4_p:"Las operaciones salen desde tu propia conexión, sin atarse a un país. Estés donde estés, funciona.",
  row5_h:"Detente cuando quieras",row5_p:"Apaga la extensión o cierra sesión en el exchange — y todo se congela. No estás atado a nada.",
  bb_k:"¿y cómo encuentra el motor esos momentos?",
  bb_p:"Esa es nuestra cocina — años de ajuste y estadística real. No necesitas saberlo: solo te conectas y recibes tu parte de lo que gana tu cuenta.",
  join_eyebrow:"vamos",join_h2:"Tres minutos — y tu cuenta está en juego",
  step1:"1 · recibes tu archivo",step2:"2 · instalas la extensión",step3:"3 · entras en MEXC",
  join_lede:"Después trabaja sola. ¿Listo? Escribe al operador que te envió este enlace.",
  note:"Repartimos la ganancia según lo acordado: se calcula desde el registro de cada operación, con transparencia. Tu cuenta y tu dinero siempre son tuyos."},
 pt:{name:"Português",badge:"MEXC · pares sem taxa",h1a:"Sua conta",h1b:"trabalha sozinha",
  hero_lede:"Conecte sua conta em três minutos. Depois ela opera sem você — e a qualquer momento você vê quanto já ganhou.",
  scroll:"deslize",what_eyebrow:"a ideia",what_h2:"De onde vem o lucro",
  what_lede:"Às vezes o preço da corretora atrasa em relação ao preço justo, por frações de segundo. Nosso motor pega esse momento e aproveita a recuperação. Esses pares não têm taxa, então até uma recuperação mínima termina em lucro.",
  card_gap_h:"O atraso",card_gap_p:"O momento em que a corretora não acompanhou o preço justo. Essa é a nossa presa.",
  card_zero_h:"Zero taxa",card_zero_p:"Nos pares escolhidos a corretora não cobra nada. Toda a recuperação fica com você.",
  card_fast_h:"Entradas de segundos",card_fast_p:"Uma operação dura segundos. Entra, pega a recuperação, sai — e espera o próximo momento.",
  how_eyebrow:"como funciona",how_h2:"Você tem as chaves. Nós temos o motor.",
  how_lede:"Nunca temos acesso ao seu dinheiro. Você continua dono total da conta — o motor só sugere as jogadas.",
  row1_h:"Seu acesso fica com você",row1_p:"A extensão roda no seu navegador, sob o seu login. O operador não vê o seu acesso.",
  row2_h:"Seu dinheiro não pode ser sacado",row2_p:"Qualquer saque exige a sua confirmação na corretora. Esvaziar o saldo é tecnicamente impossível.",
  row3_h:"O motor envia as jogadas — sua conta executa",row3_p:"Você não aperta nada. Tudo acontece sozinho enquanto você toca a sua vida.",
  row4_h:"Funciona de qualquer lugar",row4_p:"As operações saem da sua própria internet, sem amarra a um país. Onde você estiver, funciona.",
  row5_h:"Pare quando quiser",row5_p:"Desligue a extensão ou saia da corretora — e tudo congela. Você não fica preso a nada.",
  bb_k:"e como o motor acha esses momentos?",
  bb_p:"Essa é a nossa cozinha — anos de ajuste e estatística real. Você não precisa saber: é só conectar e receber a sua parte do que a sua conta ganhou.",
  join_eyebrow:"bora",join_h2:"Três minutos — e a conta está no jogo",
  step1:"1 · recebe o seu arquivo",step2:"2 · instala a extensão",step3:"3 · entra na MEXC",
  join_lede:"Depois ela trabalha sozinha. Pronto? Fale com o operador que te enviou este link.",
  note:"Dividimos o lucro conforme combinado: calculado pelo registro de cada operação, com transparência. Sua conta e seu dinheiro são sempre seus."},
 tr:{name:"Türkçe",badge:"MEXC · komisyonsuz pariteler",h1a:"Hesabın",h1b:"kendi kendine çalışır",
  hero_lede:"Hesabını üç dakikada bağla. Sonrası sensiz işlem yapar — ve ne kadar kazandığını istediğin an görürsün.",
  scroll:"kaydır",what_eyebrow:"fikir",what_h2:"Kâr nereden geliyor",
  what_lede:"Borsadaki fiyat bazen adil fiyatın gerisinde kalır — saniyenin küçük bir kısmı kadar. Motorumuz bu anı yakalar ve toparlanmadan yararlanır. Bu paritelerde komisyon yok, yani küçücük bir toparlanma bile kâra döner.",
  card_gap_h:"Gecikme",card_gap_p:"Borsanın adil fiyata yetişemediği an. İşte avımız bu.",
  card_zero_h:"Sıfır komisyon",card_zero_p:"Seçili paritelerde borsa hiçbir kesinti almaz. Toparlanmanın tamamı sende kalır.",
  card_fast_h:"Saniyelik girişler",card_fast_p:"Bir işlem saniyeler yaşar. Gir, toparlanmayı al, çık — ve bir sonraki anı bekle.",
  how_eyebrow:"nasıl çalışır",how_h2:"Anahtarlar sende. Motor bizde.",
  how_lede:"Paranıza asla erişemeyiz. Hesabın tam sahibi sen kalırsın — motor sadece hamleleri önerir.",
  row1_h:"Girişin sende kalır",row1_p:"Uzantı senin tarayıcında, senin oturumunla çalışır. Operatör erişimini görmez.",
  row2_h:"Paran çekilemez",row2_p:"Her çekim borsada senin onayını ister. Bakiyeyi boşaltmak teknik olarak imkânsız.",
  row3_h:"Motor hamleyi gönderir — hesabın uygular",row3_p:"Hiçbir şeye basmazsın. Sen işine bakarken her şey kendiliğinden olur.",
  row4_h:"Her konumdan çalışır",row4_p:"İşlemler senin kendi internetinden çıkar, bir ülkeye bağlı değil. Neredeysen orada çalışır.",
  row5_h:"İstediğin an durdur",row5_p:"Uzantıyı kapat ya da borsadan çık — her şey durur. Hiçbir şeye bağlı değilsin.",
  bb_k:"peki motor bu anları nasıl buluyor?",
  bb_p:"Bu bizim mutfağımız — yıllarca ayar ve canlı istatistik. Bilmene gerek yok: sadece bağlanırsın ve hesabının kazandığından payını alırsın.",
  join_eyebrow:"hadi başlayalım",join_h2:"Üç dakika — ve hesabın oyunda",
  step1:"1 · dosyanı al",step2:"2 · uzantıyı kur",step3:"3 · MEXC'e giriş yap",
  join_lede:"Sonrası kendi kendine çalışır. Hazır mısın? Bu bağlantıyı gönderen operatöre yaz.",
  note:"Kârı anlaştığımız gibi bölüşürüz: her işlemin kaydından, şeffaf biçimde hesaplanır. Hesabın da paran da hep senindir."},
 zh:{name:"中文",badge:"MEXC · 零手续费交易对",h1a:"你的账户",h1b:"自动为你运转",
  hero_lede:"三分钟连接你的账户。之后它无需你操作即可交易 — 你随时都能看到赚了多少。",
  scroll:"下滑",what_eyebrow:"原理",what_h2:"利润从何而来",
  what_lede:"交易所的价格有时会比公允价格慢上几分之一秒。我们的引擎抓住这一刻，赚取追赶的差价。这些交易对零手续费，所以哪怕极小的追赶也能盈利。",
  card_gap_h:"价格滞后",card_gap_p:"交易所还没追上公允价格的那一刻。这就是我们的猎物。",
  card_zero_h:"零手续费",card_zero_p:"在选定的交易对上，交易所不收任何费用。全部差价都归你。",
  card_fast_h:"秒级进出",card_fast_p:"一笔交易只存活几秒。进场、拿下差价、离场 — 然后等待下一次机会。",
  how_eyebrow:"如何运作",how_h2:"钥匙在你手里，引擎在我们手里。",
  how_lede:"我们永远接触不到你的资金。你始终是账户的完全主人 — 引擎只负责提示操作。",
  row1_h:"你的登录只属于你",row1_p:"扩展在你的浏览器、你的登录下运行。操作方看不到你的账户访问。",
  row2_h:"你的资金无法被提走",row2_p:"任何提现都需要你在交易所确认。从技术上无法转走余额。",
  row3_h:"引擎发出指令 — 账户执行",row3_p:"你什么都不用按。你在忙自己的事，一切自动完成。",
  row4_h:"任何地区都能用",row4_p:"交易从你自己的网络发出，不绑定任何国家。无论你在哪里，都能运行。",
  row5_h:"随时停止",row5_p:"关闭扩展或退出交易所 — 一切立即冻结。你不受任何约束。",
  bb_k:"那引擎到底怎么找到这些时机？",
  bb_p:"这是我们的独门配方 — 多年的调校和实时数据。你不需要知道：你只管接入，然后从账户赚到的钱里拿走你的那份。",
  join_eyebrow:"出发",join_h2:"三分钟 — 账户就上场了",
  step1:"1 · 拿到你的文件",step2:"2 · 安装扩展",step3:"3 · 登录 MEXC",
  join_lede:"之后它自动运转。准备好了吗？联系把这个链接发给你的操作方。",
  note:"利润按约定分成：依据每一笔交易的记录透明计算。账户和资金始终是你的。"},
 ar:{name:"العربية",badge:"MEXC · أزواج بدون رسوم",h1a:"حسابك",h1b:"يعمل من تلقاء نفسه",
  hero_lede:"اربط حسابك في ثلاث دقائق. بعدها يتداول بدونك — وتستطيع أن ترى كم ربحت في أي لحظة.",
  scroll:"مرّر للأسفل",what_eyebrow:"الفكرة",what_h2:"من أين يأتي الربح",
  what_lede:"أحيانًا يتأخر سعر المنصة عن السعر العادل بأجزاء من الثانية. محرّكنا يلتقط هذه اللحظة ويستفيد من اللحاق. هذه الأزواج بدون رسوم، لذا حتى أصغر لحاق ينتهي بربح.",
  card_gap_h:"التأخّر",card_gap_p:"اللحظة التي لم تلحق فيها المنصة بالسعر العادل. هذه هي فريستنا.",
  card_zero_h:"صفر رسوم",card_zero_p:"في الأزواج المختارة لا تأخذ المنصة أي عمولة. كل اللحاق يبقى لك.",
  card_fast_h:"دخول بالثواني",card_fast_p:"الصفقة تعيش ثوانٍ. تدخل، تأخذ اللحاق، تخرج — ثم تنتظر اللحظة التالية.",
  how_eyebrow:"كيف يعمل",how_h2:"أنت تملك المفاتيح. ونحن نملك المحرّك.",
  how_lede:"لا نصل أبدًا إلى أموالك. تبقى المالك الكامل لحسابك — المحرّك يقترح الحركات فقط.",
  row1_h:"دخولك يبقى معك",row1_p:"الإضافة تعمل في متصفحك، بتسجيل دخولك. المشغّل لا يرى وصولك.",
  row2_h:"لا يمكن سحب أموالك",row2_p:"أي سحب يتطلب تأكيدك على المنصة. تفريغ الرصيد مستحيل تقنيًا.",
  row3_h:"المحرّك يرسل الحركات — وحسابك ينفّذ",row3_p:"لا تضغط شيئًا. كل شيء يحدث تلقائيًا بينما تعيش يومك.",
  row4_h:"يعمل من أي مكان",row4_p:"الصفقات تخرج من إنترنتك أنت، دون ارتباط بأي بلد. أينما كنت، يعمل.",
  row5_h:"أوقفه في أي لحظة",row5_p:"أطفئ الإضافة أو اخرج من المنصة — ويتجمّد كل شيء. لست مقيّدًا بأي شيء.",
  bb_k:"وكيف يجد المحرّك هذه اللحظات؟",
  bb_p:"هذا مطبخنا — سنوات من الضبط والإحصاء الحيّ. لا تحتاج لمعرفته: تكتفي بالاتصال وتأخذ حصتك مما ربحه حسابك.",
  join_eyebrow:"هيا بنا",join_h2:"ثلاث دقائق — وحسابك في الملعب",
  step1:"1 · تستلم ملفك",step2:"2 · تثبّت الإضافة",step3:"3 · تسجّل الدخول إلى MEXC",
  join_lede:"بعدها يعمل وحده. جاهز؟ راسل المشغّل الذي أرسل لك هذا الرابط.",
  note:"نقتسم الربح حسب الاتفاق: يُحسب من سجل كل صفقة، بشفافية. حسابك وأموالك تبقى لك دائمًا."}

 fr:{name:"Français",badge:"MEXC · paires sans frais",h1a:"Ton compte",h1b:"travaille tout seul",
  hero_lede:"Connecte ton compte en trois minutes. Ensuite il trade sans toi — et tu vois à tout moment combien tu as gagné.",
  scroll:"défiler",what_eyebrow:"l'idée",what_h2:"D'où vient le profit",
  what_lede:"Parfois le prix de la plateforme accuse un retard sur le prix juste — d'une fraction de seconde. Notre moteur saisit ce moment et profite du rattrapage. Ces paires sont sans frais, donc même un tout petit rattrapage finit en profit.",
  card_gap_h:"Le retard",card_gap_p:"Le moment où la plateforme n'a pas rattrapé le prix juste. C'est notre proie.",
  card_zero_h:"Zéro frais",card_zero_p:"Sur les paires choisies la plateforme ne prend rien. Tout le rattrapage te revient.",
  card_fast_h:"Entrées de quelques secondes",card_fast_p:"Une opération dure des secondes. Tu entres, tu prends le rattrapage, tu sors — puis tu attends le prochain moment.",
  how_eyebrow:"comment ça marche",how_h2:"Tu as les clés. Nous avons le moteur.",
  how_lede:"Nous n'accédons jamais à ton argent. Tu restes le propriétaire total de ton compte — le moteur ne fait que suggérer les coups.",
  row1_h:"Ton accès reste chez toi",row1_p:"L'extension tourne dans ton navigateur, sous ta session. L'opérateur ne voit pas ton accès.",
  row2_h:"Ton argent ne peut pas être retiré",row2_p:"Tout retrait exige ta confirmation sur la plateforme. Vider le solde est techniquement impossible.",
  row3_h:"Le moteur envoie les coups — ton compte exécute",row3_p:"Tu n'appuies sur rien. Tout se fait tout seul pendant que tu vis ta vie.",
  row4_h:"Fonctionne depuis n'importe où",row4_p:"Les ordres partent de ta propre connexion, sans lien avec un pays. Où que tu sois, ça marche.",
  row5_h:"Arrête quand tu veux",row5_p:"Éteins l'extension ou déconnecte-toi de la plateforme — tout se fige. Tu n'es lié à rien.",
  bb_k:"et comment le moteur trouve-t-il ces moments ?",
  bb_p:"C'est notre cuisine — des années de réglage et de statistiques en direct. Tu n'as pas besoin de la connaître : tu te connectes et tu prends ta part de ce que ton compte a gagné.",
  join_eyebrow:"c'est parti",join_h2:"Trois minutes — et ton compte est en jeu",
  step1:"1 · tu reçois ton fichier",step2:"2 · tu installes l'extension",step3:"3 · tu te connectes à MEXC",
  join_lede:"Ensuite il travaille tout seul. Prêt ? Écris à l'opérateur qui t'a envoyé ce lien.",
  note:"On partage le profit comme convenu : calculé à partir du journal de chaque opération, en toute transparence. Ton compte et ton argent restent toujours les tiens."},
 de:{name:"Deutsch",badge:"MEXC · gebührenfreie Paare",h1a:"Dein Konto",h1b:"arbeitet von allein",
  hero_lede:"Verbinde dein Konto in drei Minuten. Danach handelt es ohne dich — und du siehst jederzeit, wie viel du verdient hast.",
  scroll:"scrollen",what_eyebrow:"die Idee",what_h2:"Woher der Gewinn kommt",
  what_lede:"Manchmal hinkt der Börsenpreis dem fairen Preis hinterher — um den Bruchteil einer Sekunde. Unsere Engine fängt diesen Moment und nutzt das Aufholen. Diese Paare sind gebührenfrei, also endet selbst ein winziges Aufholen im Gewinn.",
  card_gap_h:"Der Rückstand",card_gap_p:"Der Moment, in dem die Börse dem fairen Preis nicht gefolgt ist. Das ist unsere Beute.",
  card_zero_h:"Null Gebühren",card_zero_p:"Bei den gewählten Paaren nimmt die Börse nichts. Das ganze Aufholen bleibt dir.",
  card_fast_h:"Sekundenkurze Einstiege",card_fast_p:"Ein Trade lebt Sekunden. Rein, das Aufholen mitnehmen, raus — dann auf den nächsten Moment warten.",
  how_eyebrow:"wie es funktioniert",how_h2:"Du hast die Schlüssel. Wir haben die Engine.",
  how_lede:"Wir bekommen nie Zugriff auf dein Geld. Du bleibst voller Eigentümer deines Kontos — die Engine schlägt nur die Züge vor.",
  row1_h:"Dein Login bleibt bei dir",row1_p:"Die Erweiterung läuft in deinem Browser, unter deinem Login. Der Betreiber sieht deinen Zugang nicht.",
  row2_h:"Dein Geld kann nicht abgehoben werden",row2_p:"Jede Auszahlung braucht deine Bestätigung auf der Börse. Das Guthaben zu leeren ist technisch unmöglich.",
  row3_h:"Die Engine sendet Züge — dein Konto führt aus",row3_p:"Du drückst nichts. Alles passiert von allein, während du deinen Tag lebst.",
  row4_h:"Funktioniert von jedem Ort",row4_p:"Die Orders gehen von deinem eigenen Internet aus, ohne Bindung an ein Land. Wo du auch bist, es funktioniert.",
  row5_h:"Jederzeit stoppen",row5_p:"Erweiterung aus oder von der Börse abmelden — alles friert ein. Du bist an nichts gebunden.",
  bb_k:"und wie findet die Engine diese Momente?",
  bb_p:"Das ist unsere Küche — Jahre der Feinabstimmung und Live-Statistik. Du musst sie nicht kennen: Du verbindest dich einfach und bekommst deinen Anteil an dem, was dein Konto verdient hat.",
  join_eyebrow:"los geht's",join_h2:"Drei Minuten — und dein Konto ist im Spiel",
  step1:"1 · du bekommst deine Datei",step2:"2 · du installierst die Erweiterung",step3:"3 · du meldest dich bei MEXC an",
  join_lede:"Danach arbeitet es von allein. Bereit? Schreib dem Betreiber, der dir diesen Link geschickt hat.",
  note:"Wir teilen den Gewinn wie vereinbart: berechnet aus dem Protokoll jedes Trades, transparent. Dein Konto und dein Geld gehören immer dir."},
 it:{name:"Italiano",badge:"MEXC · coppie senza commissioni",h1a:"Il tuo account",h1b:"lavora da solo",
  hero_lede:"Collega il tuo account in tre minuti. Poi opera senza di te — e vedi in qualsiasi momento quanto hai guadagnato.",
  scroll:"scorri",what_eyebrow:"l'idea",what_h2:"Da dove arriva il profitto",
  what_lede:"A volte il prezzo dell'exchange resta indietro rispetto al prezzo equo — per frazioni di secondo. Il nostro motore coglie quel momento e sfrutta il recupero. Queste coppie non hanno commissioni, quindi anche un recupero minimo si chiude in profitto.",
  card_gap_h:"Il ritardo",card_gap_p:"Il momento in cui l'exchange non ha raggiunto il prezzo equo. È la nostra preda.",
  card_zero_h:"Zero commissioni",card_zero_p:"Sulle coppie scelte l'exchange non prende nulla. Tutto il recupero resta a te.",
  card_fast_h:"Entrate di pochi secondi",card_fast_p:"Un'operazione vive secondi. Entri, prendi il recupero, esci — e aspetti il prossimo momento.",
  how_eyebrow:"come funziona",how_h2:"Tu hai le chiavi. Noi il motore.",
  how_lede:"Non accediamo mai al tuo denaro. Resti il proprietario totale dell'account — il motore suggerisce solo le mosse.",
  row1_h:"Il tuo accesso resta con te",row1_p:"L'estensione gira nel tuo browser, con il tuo login. L'operatore non vede il tuo accesso.",
  row2_h:"Il tuo denaro non può essere prelevato",row2_p:"Ogni prelievo richiede la tua conferma sull'exchange. Svuotare il saldo è tecnicamente impossibile.",
  row3_h:"Il motore invia le mosse — il tuo account esegue",row3_p:"Non premi nulla. Tutto avviene da solo mentre vivi la tua giornata.",
  row4_h:"Funziona da qualsiasi luogo",row4_p:"Gli ordini partono dalla tua connessione, senza legami con un paese. Ovunque tu sia, funziona.",
  row5_h:"Fermati quando vuoi",row5_p:"Spegni l'estensione o esci dall'exchange — tutto si blocca. Non sei legato a nulla.",
  bb_k:"e come fa il motore a trovare questi momenti?",
  bb_p:"Questa è la nostra cucina — anni di messa a punto e statistica dal vivo. Non ti serve saperlo: ti colleghi e prendi la tua parte di ciò che il tuo account ha guadagnato.",
  join_eyebrow:"si parte",join_h2:"Tre minuti — e il tuo account è in gioco",
  step1:"1 · ricevi il tuo file",step2:"2 · installi l'estensione",step3:"3 · accedi a MEXC",
  join_lede:"Poi lavora da solo. Pronto? Scrivi all'operatore che ti ha mandato questo link.",
  note:"Dividiamo il profitto come concordato: calcolato dal registro di ogni operazione, in trasparenza. Il tuo account e i tuoi soldi restano sempre tuoi."},
 uk:{name:"Українська",badge:"MEXC · пари без комісії",h1a:"Твій акаунт",h1b:"працює сам",
  hero_lede:"Підключаєш свій акаунт за три хвилини. Далі він торгує без тебе — а ти будь-якої миті бачиш, скільки заробив.",
  scroll:"гортай",what_eyebrow:"суть",what_h2:"Звідки береться профіт",
  what_lede:"Ціна на біржі іноді трохи відстає від справедливої — на частки секунди. Наш рушій ловить цей момент і заходить на догін. На цих парах немає комісії, тож навіть крихітний догін дає плюс.",
  card_gap_h:"Відставання",card_gap_p:"Момент, коли біржа не встигла за чесною ціною. Це і є наша здобич.",
  card_zero_h:"Нуль комісії",card_zero_p:"На обраних парах біржа не бере збору. Увесь догін лишається тобі.",
  card_fast_h:"Секундні входи",card_fast_p:"Угода живе секунди. Зайшов, забрав догін, вийшов — і знову чекаєш момент.",
  how_eyebrow:"як це влаштовано",how_h2:"Ти тримаєш ключі. Ми тримаємо рушій.",
  how_lede:"Жодного доступу до твоїх грошей ми не отримуємо. Ти лишаєшся повним господарем акаунта — рушій лише підказує ходи.",
  row1_h:"Твій вхід лишається в тебе",row1_p:"Розширення працює у твоєму браузері, під твоїм логіном. Оператор твій доступ не бачить.",
  row2_h:"Вивести твої гроші неможливо",row2_p:"Будь-який вивід вимагає твого підтвердження на біржі. Технічно спорожнити баланс неможливо.",
  row3_h:"Рушій надсилає ходи — акаунт виконує",row3_p:"Ти нічого не натискаєш. Усе відбувається само, поки ти займаєшся своїми справами.",
  row4_h:"Працює з будь-якої точки світу",row4_p:"Угоди йдуть із твого інтернету, без прив'язки до країни. Хоч би де ти був — працює.",
  row5_h:"Стоп будь-якої миті",row5_p:"Вимкнув розширення або вийшов із біржі — і все завмерло. Ти нічим не зв'язаний.",
  bb_k:"а як саме рушій знаходить моменти?",
  bb_p:"Це наша кухня — роки налаштування та живої статистики. Тобі це знати не треба: ти просто підключаєшся і отримуєш свою частку з того, що заробив твій акаунт.",
  join_eyebrow:"поїхали",join_h2:"Три хвилини — і акаунт у грі",
  step1:"1 · отримуєш свій файл",step2:"2 · ставиш розширення",step3:"3 · заходиш у MEXC",
  join_lede:"Далі він працює сам. Готовий — напиши оператору, який надіслав тобі це посилання.",
  note:"Профіт ділимо за домовленістю: рахується за логом кожної угоди, прозоро. Акаунт і гроші завжди твої."},
 pl:{name:"Polski",badge:"MEXC · pary bez prowizji",h1a:"Twoje konto",h1b:"pracuje samo",
  hero_lede:"Podłącz swoje konto w trzy minuty. Potem handluje bez ciebie — a w każdej chwili widzisz, ile zarobiłeś.",
  scroll:"przewiń",what_eyebrow:"o co chodzi",what_h2:"Skąd bierze się zysk",
  what_lede:"Cena na giełdzie czasem opóźnia się wobec ceny uczciwej — o ułamek sekundy. Nasz silnik łapie ten moment i korzysta z nadrabiania. Te pary są bez prowizji, więc nawet drobne nadrobienie kończy się zyskiem.",
  card_gap_h:"Opóźnienie",card_gap_p:"Moment, gdy giełda nie nadążyła za uczciwą ceną. To nasza zdobycz.",
  card_zero_h:"Zero prowizji",card_zero_p:"Na wybranych parach giełda nie pobiera nic. Całe nadrobienie zostaje u ciebie.",
  card_fast_h:"Wejścia na sekundy",card_fast_p:"Transakcja żyje sekundy. Wchodzisz, bierzesz nadrobienie, wychodzisz — i czekasz na kolejny moment.",
  how_eyebrow:"jak to działa",how_h2:"Ty masz klucze. My mamy silnik.",
  how_lede:"Nigdy nie mamy dostępu do twoich pieniędzy. Pozostajesz pełnym właścicielem konta — silnik tylko podpowiada ruchy.",
  row1_h:"Twój login zostaje u ciebie",row1_p:"Rozszerzenie działa w twojej przeglądarce, na twoim logowaniu. Operator nie widzi twojego dostępu.",
  row2_h:"Twoich pieniędzy nie da się wypłacić",row2_p:"Każda wypłata wymaga twojego potwierdzenia na giełdzie. Opróżnienie salda jest technicznie niemożliwe.",
  row3_h:"Silnik wysyła ruchy — konto wykonuje",row3_p:"Niczego nie naciskasz. Wszystko dzieje się samo, gdy zajmujesz się swoimi sprawami.",
  row4_h:"Działa z każdego miejsca",row4_p:"Zlecenia wychodzą z twojego własnego internetu, bez przywiązania do kraju. Gdziekolwiek jesteś — działa.",
  row5_h:"Zatrzymaj w każdej chwili",row5_p:"Wyłącz rozszerzenie albo wyloguj się z giełdy — wszystko zamiera. Nic cię nie wiąże.",
  bb_k:"a jak silnik znajduje te momenty?",
  bb_p:"To nasza kuchnia — lata strojenia i statystyki na żywo. Nie musisz jej znać: po prostu się łączysz i bierzesz swoją część z tego, co zarobiło twoje konto.",
  join_eyebrow:"ruszamy",join_h2:"Trzy minuty — i konto jest w grze",
  step1:"1 · dostajesz swój plik",step2:"2 · instalujesz rozszerzenie",step3:"3 · logujesz się do MEXC",
  join_lede:"Potem pracuje samo. Gotowy? Napisz do operatora, który wysłał ci ten link.",
  note:"Zysk dzielimy zgodnie z umową: liczony z rejestru każdej transakcji, przejrzyście. Konto i pieniądze zawsze są twoje."},
 id:{name:"Indonesia",badge:"MEXC · pasangan tanpa biaya",h1a:"Akunmu",h1b:"bekerja sendiri",
  hero_lede:"Hubungkan akunmu dalam tiga menit. Setelah itu ia trading tanpa kamu — dan kapan saja kamu bisa melihat berapa yang sudah kamu hasilkan.",
  scroll:"geser",what_eyebrow:"idenya",what_h2:"Dari mana untungnya",
  what_lede:"Kadang harga di bursa tertinggal dari harga wajar — sepersekian detik. Mesin kami menangkap momen itu dan memanfaatkan pengejaran. Pasangan ini tanpa biaya, jadi pengejaran sekecil apa pun berakhir untung.",
  card_gap_h:"Ketertinggalan",card_gap_p:"Saat bursa belum menyusul harga wajar. Itulah buruan kami.",
  card_zero_h:"Nol biaya",card_zero_p:"Pada pasangan terpilih bursa tidak memungut apa pun. Seluruh pengejaran jadi milikmu.",
  card_fast_h:"Masuk hitungan detik",card_fast_p:"Satu transaksi hidup beberapa detik. Masuk, ambil pengejaran, keluar — lalu tunggu momen berikutnya.",
  how_eyebrow:"cara kerjanya",how_h2:"Kamu pegang kuncinya. Kami pegang mesinnya.",
  how_lede:"Kami tidak pernah mengakses uangmu. Kamu tetap pemilik penuh akun — mesin hanya menyarankan langkah.",
  row1_h:"Login-mu tetap milikmu",row1_p:"Ekstensi berjalan di browsermu, dengan login-mu. Operator tidak melihat aksesmu.",
  row2_h:"Uangmu tidak bisa ditarik",row2_p:"Setiap penarikan butuh konfirmasimu di bursa. Menguras saldo secara teknis mustahil.",
  row3_h:"Mesin mengirim langkah — akunmu mengeksekusi",row3_p:"Kamu tidak menekan apa pun. Semua terjadi sendiri saat kamu menjalani harimu.",
  row4_h:"Bekerja dari lokasi mana pun",row4_p:"Order keluar dari internetmu sendiri, tanpa terikat negara. Di mana pun kamu, ia bekerja.",
  row5_h:"Berhenti kapan saja",row5_p:"Matikan ekstensi atau keluar dari bursa — semua berhenti. Kamu tidak terikat apa pun.",
  bb_k:"lalu bagaimana mesin menemukan momen ini?",
  bb_p:"Itu dapur kami — bertahun-tahun penyetelan dan statistik langsung. Kamu tak perlu tahu: cukup terhubung dan ambil bagianmu dari yang dihasilkan akunmu.",
  join_eyebrow:"ayo mulai",join_h2:"Tiga menit — dan akunmu bermain",
  step1:"1 · terima file-mu",step2:"2 · pasang ekstensi",step3:"3 · masuk ke MEXC",
  join_lede:"Setelah itu ia bekerja sendiri. Siap? Hubungi operator yang mengirimimu tautan ini.",
  note:"Keuntungan dibagi sesuai kesepakatan: dihitung dari catatan setiap transaksi, transparan. Akun dan uangmu selalu milikmu."},
 vi:{name:"Tiếng Việt",badge:"MEXC · cặp không phí",h1a:"Tài khoản của bạn",h1b:"tự làm việc",
  hero_lede:"Kết nối tài khoản trong ba phút. Sau đó nó giao dịch không cần bạn — và bất cứ lúc nào bạn cũng thấy mình kiếm được bao nhiêu.",
  scroll:"cuộn",what_eyebrow:"ý tưởng",what_h2:"Lợi nhuận đến từ đâu",
  what_lede:"Giá trên sàn đôi khi trễ hơn giá hợp lý — chỉ một phần nhỏ của giây. Bộ máy của chúng tôi bắt lấy khoảnh khắc đó và tận dụng phần đuổi kịp. Các cặp này không có phí, nên dù đuổi kịp rất nhỏ vẫn thành lợi nhuận.",
  card_gap_h:"Độ trễ",card_gap_p:"Khoảnh khắc sàn chưa đuổi kịp giá hợp lý. Đó là con mồi của chúng tôi.",
  card_zero_h:"Không phí",card_zero_p:"Trên các cặp đã chọn, sàn không lấy gì. Toàn bộ phần đuổi kịp là của bạn.",
  card_fast_h:"Vào lệnh vài giây",card_fast_p:"Một lệnh sống vài giây. Vào, lấy phần đuổi kịp, ra — rồi chờ khoảnh khắc tiếp theo.",
  how_eyebrow:"cách hoạt động",how_h2:"Bạn giữ chìa khóa. Chúng tôi giữ bộ máy.",
  how_lede:"Chúng tôi không bao giờ chạm tới tiền của bạn. Bạn vẫn là chủ hoàn toàn của tài khoản — bộ máy chỉ gợi ý nước đi.",
  row1_h:"Đăng nhập ở lại với bạn",row1_p:"Tiện ích chạy trong trình duyệt của bạn, dưới đăng nhập của bạn. Người vận hành không thấy quyền truy cập của bạn.",
  row2_h:"Không thể rút tiền của bạn",row2_p:"Mọi lần rút đều cần bạn xác nhận trên sàn. Rút cạn số dư là bất khả thi về kỹ thuật.",
  row3_h:"Bộ máy gửi nước đi — tài khoản thực thi",row3_p:"Bạn không bấm gì cả. Mọi thứ tự diễn ra trong khi bạn sống cuộc sống của mình.",
  row4_h:"Hoạt động từ bất kỳ đâu",row4_p:"Lệnh đi ra từ internet của chính bạn, không ràng buộc quốc gia nào. Dù bạn ở đâu, nó vẫn chạy.",
  row5_h:"Dừng bất cứ lúc nào",row5_p:"Tắt tiện ích hoặc đăng xuất khỏi sàn — mọi thứ đứng yên. Bạn không bị ràng buộc gì cả.",
  bb_k:"vậy bộ máy tìm những khoảnh khắc đó bằng cách nào?",
  bb_p:"Đó là bí quyết của chúng tôi — nhiều năm tinh chỉnh và thống kê trực tiếp. Bạn không cần biết: chỉ cần kết nối và nhận phần của mình từ số tài khoản kiếm được.",
  join_eyebrow:"bắt đầu nào",join_h2:"Ba phút — và tài khoản vào cuộc",
  step1:"1 · nhận tệp của bạn",step2:"2 · cài tiện ích",step3:"3 · đăng nhập MEXC",
  join_lede:"Sau đó nó tự làm việc. Sẵn sàng chưa? Nhắn cho người vận hành đã gửi bạn liên kết này.",
  note:"Chúng ta chia lợi nhuận như đã thỏa thuận: tính từ nhật ký mỗi lệnh, minh bạch. Tài khoản và tiền luôn là của bạn."},
 hi:{name:"हिन्दी",badge:"MEXC · बिना शुल्क वाले पेयर",h1a:"आपका अकाउंट",h1b:"खुद काम करता है",
  hero_lede:"तीन मिनट में अपना अकाउंट जोड़ें। उसके बाद यह आपके बिना ट्रेड करता है — और आप किसी भी समय देख सकते हैं कि कितना कमाया।",
  scroll:"स्क्रॉल करें",what_eyebrow:"विचार",what_h2:"मुनाफ़ा कहाँ से आता है",
  what_lede:"एक्सचेंज की कीमत कभी-कभी सही कीमत से पीछे रह जाती है — सेकंड के अंश भर। हमारा इंजन उस पल को पकड़कर पिछड़न का फ़ायदा उठाता है। इन पेयर पर कोई शुल्क नहीं, इसलिए ज़रा-सी पिछड़न भी मुनाफ़े में बदल जाती है।",
  card_gap_h:"पिछड़न",card_gap_p:"वह पल जब एक्सचेंज सही कीमत तक नहीं पहुँचा। यही हमारा शिकार है।",
  card_zero_h:"शून्य शुल्क",card_zero_p:"चुने हुए पेयर पर एक्सचेंज कुछ नहीं लेता। पूरी पिछड़न आपकी।",
  card_fast_h:"सेकंडों की एंट्री",card_fast_p:"एक ट्रेड कुछ सेकंड जीता है। घुसो, पिछड़न लो, निकलो — फिर अगले पल का इंतज़ार।",
  how_eyebrow:"यह कैसे काम करता है",how_h2:"चाबियाँ आपके पास। इंजन हमारे पास।",
  how_lede:"हम आपके पैसे तक कभी नहीं पहुँचते। अकाउंट के पूरे मालिक आप ही रहते हैं — इंजन सिर्फ़ चालें सुझाता है।",
  row1_h:"आपका लॉगिन आपके पास रहता है",row1_p:"एक्सटेंशन आपके ब्राउज़र में, आपके लॉगिन पर चलता है। ऑपरेटर को आपकी पहुँच नहीं दिखती।",
  row2_h:"आपका पैसा निकाला नहीं जा सकता",row2_p:"किसी भी निकासी के लिए एक्सचेंज पर आपकी पुष्टि ज़रूरी है। बैलेंस खाली करना तकनीकी रूप से असंभव है।",
  row3_h:"इंजन चालें भेजता है — अकाउंट अंजाम देता है",row3_p:"आप कुछ नहीं दबाते। आप अपने काम में लगे रहते हैं और सब अपने आप होता है।",
  row4_h:"किसी भी जगह से चलता है",row4_p:"ऑर्डर आपके अपने इंटरनेट से जाते हैं, किसी देश से बंधे बिना। आप जहाँ भी हों — यह चलता है।",
  row5_h:"जब चाहें रोकें",row5_p:"एक्सटेंशन बंद करें या एक्सचेंज से लॉगआउट करें — सब थम जाता है। आप किसी बंधन में नहीं।",

function shade(hex,f){ const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;

    btn.onclick=function(){ const t=log.textContent;

      if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(ok,fb); } else fb();

    d.appendChild(log); d.appendChild(btn); document.body.appendChild(d); }

function flyFlag(iso,done){
  dbg('flyFlag iso='+iso+' dataLen='+((FLAGDATA[iso]||'').length));
  const img=new Image();
  img.onload=()=>{
    const nw=img.naturalWidth||640, nh=img.naturalHeight||480, SC=2048/nw;   // high-res raster -> crisp (fixes the pixelation)
    const oc=document.createElement('canvas'); oc.width=Math.round(nw*SC); oc.height=Math.round(nh*SC);
    const octx=oc.getContext('2d'); octx.imageSmoothingEnabled=true; octx.imageSmoothingQuality='high';
    octx.drawImage(img,0,0,oc.width,oc.height);   // rasterize the vector flag at high res -> crisp when zoomed
    dbg('img '+nw+'x'+nh+' -> '+oc.width+'x'+oc.height);
    runFly2D(oc,done);   // reliable high-res 2D cloth (3D renders nothing on this machine)
  };
  img.onerror=()=>{ dbg('img ERROR (флаг не загрузился)'); done&&done(); };
  img.src=FLAGDATA[iso]||FLAGDATA.gb;
}
const VERT_FLAG='varying vec2 vUv; varying vec3 vN; uniform float uT;'+

 'void main(){ vUv=uv; float h=wv(uv); float e=0.0015;'+
 ' float dx=(wv(uv+vec2(e,0.0))-h)/e; float dy=(wv(uv+vec2(0.0,e))-h)/e;'+
 ' vN=normalize(vec3(-dx,-dy,1.0)); vec3 pos=position; pos.z+=h;'+
 ' gl_Position=projectionMatrix*modelViewMatrix*vec4(pos,1.0); }';
const FRAG_FLAG='precision highp float; varying vec2 vUv; varying vec3 vN; uniform sampler2D uTex; uniform vec3 uL;'+
 'void main(){ vec3 base=texture2D(uTex,vUv).rgb; vec3 N=normalize(vN), L=normalize(uL), V=vec3(0.0,0.0,1.0);'+
 ' float d=clamp(dot(N,L),0.0,1.0); vec3 H=normalize(L+V); float s=pow(clamp(dot(N,H),0.0,1.0),8.0)*0.16;'+

  function bail(){ if(fin)return; fin=true; clearTimeout(guard); if(raf)cancelAnimationFrame(raf); cleanup(); dbg('3D -> 2D'); runFly2D(oc,done); }
  function finish(){ if(fin)return; fin=true; clearTimeout(guard); if(raf)cancelAnimationFrame(raf); dbg('3D done'); cleanup(); done&&done(); }
  try{
    cv=mkCanvas();

    rnd.setPixelRatio(Math.min(devicePixelRatio||1,2)); rnd.setSize(innerWidth,innerHeight);

  cv.width=Math.max(1,Math.floor(W*dpr)); cv.height=Math.max(1,Math.floor(H*dpr));
  const ctx=cv.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
  const IW=oc.width, IH=oc.height, DUR=1400; let start=null, raf=0, fin=false;
  function frame(t){
    const e=t<0?0:t>1?1:t; ctx.clearRect(0,0,W,H);
    const b=Math.min(W/IW,H/IH)*0.95, zoom=b*(1+e*e*5.2);
    const dw=IW*zoom, dh=IH*zoom, cx=W/2, cy=H/2, left=cx-dw/2, top=cy-dh/2;
    const N=130, ssw=IW/N, dsw=dw/N, amp=dh*0.06*(1-e*0.35), ph=t*7;
    ctx.globalAlpha=e<0.8?1:Math.max(0,1-(e-0.8)/0.2);
    for(let i=0;i<N;i++){ const nx=i/N;
      const wob=Math.sin(nx*Math.PI*3-ph)*0.72 + Math.sin(nx*Math.PI*6-ph*0.8)*0.28;
      const yo=wob*amp*(0.32+nx*0.68);
      ctx.drawImage(oc, i*ssw,0, ssw,IH, left+i*dsw, top+yo, dsw+1.4, dh); }
    const g=ctx.createLinearGradient(left,0,left+dw,0);
    for(let k=0;k<=14;k++){ const nx=k/14, bb=Math.sin(nx*Math.PI*3-ph); const v=bb>0?255:0;
      g.addColorStop(nx,'rgba('+v+','+v+','+v+','+(Math.abs(bb)*0.26).toFixed(3)+')'); }
    ctx.globalCompositeOperation='soft-light'; ctx.fillStyle=g; ctx.fillRect(left,top-amp,dw,dh+amp*2);
    ctx.globalCompositeOperation='source-over'; ctx.globalAlpha=1;
  }
  frame(0); dbg('2D frame0 нарисован W='+W+' H='+H);
  function loop(ts){ if(fin)return; if(start===null)start=ts; frame((ts-start)/DUR);
    if((ts-start)/DUR>=1){finish();return;} raf=requestAnimationFrame(loop); }
  function finish(){ if(fin)return; fin=true; if(raf)cancelAnimationFrame(raf); clearTimeout(guard); dbg('2D готово'); cv.remove(); done&&done(); }
  const guard=setTimeout(finish,DUR+1200);
  raf=requestAnimationFrame(loop);
}

/* ---------- hero WebGL: the gap between two prices ---------- */
(function(){
  const c=document.getElementById('gl');
  const gl=c.getContext('webgl')||c.getContext('experimental-webgl');
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  if(!gl){ c.style.background='radial-gradient(120% 90% at 50% 35%,#0d2b2e,#070a10)'; return; }
  const vs=`attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}`;
  const fs=`precision highp float;uniform vec2 R;uniform float T;
  float wave(float x,float ph,float amp,float fr){return sin(x*fr+ph)*amp+sin(x*fr*.5-ph*1.3)*amp*.5;}
  void main(){
    vec2 uv=(gl_FragCoord.xy/R);
    float x=uv.x;
    vec3 col=vec3(0.027,0.039,0.063);
    float fair=0.5+wave(x*6.2831,T*0.35,0.11,1.0);
    float lag =0.5+wave(x*6.2831,T*0.35-0.9,0.11,1.0)*0.86-0.02;
    float y=uv.y;
    float dF=abs(y-fair), dL=abs(y-lag);
    col+=vec3(0.235,0.878,0.816)*smoothstep(0.028,0.0,dF)*0.9;
    col+=vec3(0.949,0.706,0.243)*smoothstep(0.028,0.0,dL)*0.9;
    float lo=min(fair,lag),hi=max(fair,lag);
    float inband=smoothstep(0.0,0.02,y-lo)*smoothstep(0.0,0.02,hi-y);
    col+=vec3(0.15,0.5,0.55)*inband*(0.10+0.06*sin(T*2.0+x*12.0));
    for(int i=0;i<5;i++){
      float fi=float(i);
      vec2 pp=vec2(fract(0.12*fi+T*(0.03+0.01*fi)),0.5+0.25*sin(T*0.5+fi*1.7));
      float d=length((uv-pp)*vec2(R.x/R.y,1.0));
      col+=vec3(0.2,0.7,0.7)*smoothstep(0.02,0.0,d)*0.5;
    }
    col+=(fract(sin(dot(gl_FragCoord.xy,vec2(12.9,78.2)))*43758.5)-0.5)*0.02;
    gl_FragColor=vec4(col,1.0);
  }`;
  function sh(t,s){const o=gl.createShader(t);gl.shaderSource(o,s);gl.compileShader(o);return o;}
  const pr=gl.createProgram();gl.attachShader(pr,sh(gl.VERTEX_SHADER,vs));gl.attachShader(pr,sh(gl.FRAGMENT_SHADER,fs));
  gl.linkProgram(pr);gl.useProgram(pr);
  const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  const loc=gl.getAttribLocation(pr,'p');gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
  const uR=gl.getUniformLocation(pr,'R'),uT=gl.getUniformLocation(pr,'T');
  function size(){const d=Math.min(devicePixelRatio||1,2);c.width=c.clientWidth*d;c.height=c.clientHeight*d;gl.viewport(0,0,c.width,c.height);}
  addEventListener('resize',size);size();
  let run=true,t0=null;
  new IntersectionObserver(es=>{run=es[0].isIntersecting;if(run)requestAnimationFrame(frame);},{threshold:0.01}).observe(c);
  function frame(ts){if(!run)return;if(t0===null)t0=ts;const t=(ts-t0)/1000;
    gl.uniform2f(uR,c.width,c.height);gl.uniform1f(uT,reduce?3.0:t);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);if(!reduce)requestAnimationFrame(frame);}
  requestAnimationFrame(frame);
})();

/* ---------- little card canvases ---------- */
document.querySelectorAll('canvas[data-viz]').forEach(cv=>{
  const ctx=cv.getContext('2d');const kind=cv.dataset.viz;const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  function fit(){const d=Math.min(devicePixelRatio||1,2);cv.width=cv.clientWidth*d;cv.height=cv.clientHeight*d;ctx.setTransform(d,0,0,d,0,0);}
  fit();addEventListener('resize',fit);
  let t=0;
  function draw(){
    const w=cv.clientWidth,h=cv.clientHeight;ctx.clearRect(0,0,w,h);t+=reduce?0:0.02;
    if(kind==='gap'){
      ctx.lineWidth=2;
      ctx.strokeStyle='#3ce0d0';ctx.beginPath();for(let x=0;x<=w;x++){const y=h*0.4+Math.sin(x*0.06+t)*7;x?ctx.lineTo(x,y):ctx.moveTo(x,y);}ctx.stroke();
      ctx.strokeStyle='#f2b43e';ctx.beginPath();for(let x=0;x<=w;x++){const y=h*0.62+Math.sin(x*0.06+t-0.9)*7;x?ctx.lineTo(x,y):ctx.moveTo(x,y);}ctx.stroke();
    } else if(kind==='zero'){
      ctx.strokeStyle='#1c2b3a';ctx.lineWidth=8;ctx.beginPath();ctx.arc(w/2,h/2,17,0,Math.PI*2);ctx.stroke();
      ctx.strokeStyle='#3ce0d0';ctx.lineWidth=8;ctx.lineCap='round';ctx.beginPath();ctx.arc(w/2,h/2,17,-Math.PI/2,-Math.PI/2+ (reduce?6.28:(Math.sin(t)*0.5+0.5)*6.28));ctx.stroke();
      ctx.fillStyle='#eaf1f7';ctx.font='700 16px ui-monospace,monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('0%',w/2,h/2);
    } else if(kind==='fast'){
      for(let i=0;i<3;i++){const p=((t*0.6+i*0.34)%1);ctx.globalAlpha=1-p;ctx.strokeStyle='#3ce0d0';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(4+p*(w-8),h/2);ctx.lineTo(4+p*(w-8)+14,h/2);ctx.stroke();}
      ctx.globalAlpha=1;ctx.fillStyle='#f2b43e';ctx.beginPath();ctx.arc(w-8,h/2,4,0,6.28);ctx.fill();
    }
    if(!reduce)requestAnimationFrame(draw);else return;
  }
  new IntersectionObserver(es=>{if(es[0].isIntersecting)requestAnimationFrame(draw);},{threshold:0.1}).observe(cv);
});
